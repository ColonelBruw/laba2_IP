services:

  client:
    image: carfast_client
    build:
      context: ./client
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      - DB_HOST=${DB_HOST} 
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PUBLIC_API_URL=http://${APP_HOST}:${APP_PORT}/api
    depends_on:
      db:
        condition: service_started
        
  server:
    image: carfast_server
    build:
      context: ./server
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - DB_HOST=${DB_HOST} 
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      db:
        condition: service_started
      client:
        condition: service_started

  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    # healthcheck:
    #   test: ["CMD-SHELL", "PG_ISREADY -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    volumes:
      - db-data:/var/lib/postgresql
    ports:
      - "${DB_PORT}:${DB_PORT}"

volumes:
  db-data: